<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirigiendo al Dashboard</title>
  <meta http-equiv="refresh" content="0; url=index.html">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f8fafc;
      color: #0f172a;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .card {
      width: min(92vw, 520px);
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      text-align: center;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.2rem;
    }
    p {
      margin: 0;
      color: #475569;
    }
    a {
      color: #2563eb;
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <h1>Redirigiendo al panel principal</h1>
    <p>Si no redirige automáticamente, abre <a href="index.html">index.html</a>.</p>
  </main>
  <script>
    window.location.replace('index.html');
  </script>
</body>
</html>
