name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create js/firebase-config.js from secret
        shell: bash
        env:
          FIREBASE_CONFIG_JSON: ${{ secrets.FIREBASE_CONFIG_JSON }}
        run: |
          set -e
          mkdir -p js
          if [ -z "$FIREBASE_CONFIG_JSON" ]; then
            echo "Missing FIREBASE_CONFIG_JSON secret" >&2
            exit 1
          fi
          mkdir -p js
          echo "// Firebase Configuration (Generado automáticamente por CI/CD)" > js/firebase-config.js
          printf 'const firebaseConfig = %s\n' "$FIREBASE_CONFIG_JSON" >> js/firebase-config.js
          printf 'const FIREBASE_CONFIGURED = Boolean(firebaseConfig && firebaseConfig.apiKey && firebaseConfig.apiKey != "TU_API_KEY_AQUI");\n' >> js/firebase-config.js
          printf 'window.FIREBASE_CONFIGURED = FIREBASE_CONFIGURED;\n' >> js/firebase-config.js
          printf 'let firebaseApp = null;\nlet auth = null;\nlet db = null;\n' >> js/firebase-config.js
          printf 'window.firebaseApp = firebaseApp;\nwindow.auth = auth;\nwindow.db = db;\n' >> js/firebase-config.js
          printf 'if (FIREBASE_CONFIGURED) { try { firebaseApp = firebase.initializeApp(firebaseConfig); auth = firebase.auth(); db = firebase.firestore(); window.firebaseApp = firebaseApp; window.auth = auth; window.db = db; console.log("✅ Firebase inicializado correctamente"); } catch (e) { console.warn("⚠️ Error al inicializar Firebase:", e); } } else { console.log("ℹ️ Firebase no configurado — usando localStorage como fallback"); }\n' >> js/firebase-config.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
