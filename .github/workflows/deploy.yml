name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create firebase-config.js from secrets
        run: |
          cat > js/firebase-config.js << 'EOF'
          // ============================================================
          //  Firebase Configuration (Generado automáticamente por CI/CD)
          // ============================================================

          const firebaseConfig = {
            apiKey: "${{ secrets.FIREBASE_API_KEY }}",
            authDomain: "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            projectId: "${{ secrets.FIREBASE_PROJECT_ID }}",
            storageBucket: "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            appId: "${{ secrets.FIREBASE_APP_ID }}",
            measurementId: "${{ secrets.FIREBASE_MEASUREMENT_ID }}"
          };

          const FIREBASE_CONFIGURED = firebaseConfig.apiKey !== "TU_API_KEY_AQUI";
          window.FIREBASE_CONFIGURED = FIREBASE_CONFIGURED;

          let firebaseApp = null;
          let auth = null;
          let db = null;

          window.firebaseApp = firebaseApp;
          window.auth = auth;
          window.db = db;

          if (FIREBASE_CONFIGURED) {
              try {
                  firebaseApp = firebase.initializeApp(firebaseConfig);
                  auth = firebase.auth();
                  db = firebase.firestore();
                  window.firebaseApp = firebaseApp;
                  window.auth = auth;
                  window.db = db;
                  console.log('✅ Firebase inicializado correctamente');
                  console.log('   auth.app.options =', auth.app.options);
              } catch (e) {
                  console.warn('⚠️ Error al inicializar Firebase:', e);
              }
          } else {
              console.log('ℹ️ Firebase no configurado — usando localStorage como fallback');
          }
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
