name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        shell: bash
        env:
          FIREBASE_CONFIG_JSON: ${{ secrets['FIREBASE_CONFIG_JSON'] }}
        run: |
          if [ -z "$FIREBASE_CONFIG_JSON" ]; then
            echo "Missing FIREBASE_CONFIG_JSON secret" >&2
            exit 1
          fi

          rm -rf dist
          mkdir -p dist
          rsync -a --exclude '.git' --exclude '.github' --exclude 'dist' ./ dist/

          cat > dist/js/firebase.config.js <<EOF
          window.__FIREBASE_CONFIG__ = $FIREBASE_CONFIG_JSON;
          EOF

          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const files = ['index.html', 'dashboard.html', 'registro.html', 'registrar.html'];

          for (const file of files) {
            const fullPath = path.join('dist', file);
            if (!fs.existsSync(fullPath)) {
              continue;
            }

            let html = fs.readFileSync(fullPath, 'utf8');
            if (!html.includes('js/firebase.config.js')) {
              html = html.replace(
                '<script src="js/firebase.js"></script>',
                '<script src="js/firebase.config.js"></script>\n  <script src="js/firebase.js"></script>'
              );
              fs.writeFileSync(fullPath, html);
            }
          }
          NODE

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4